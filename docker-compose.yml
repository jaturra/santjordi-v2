services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-santjordi}
      POSTGRES_USER: ${POSTGRES_USER:-santjordi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-santjordi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-santjordi}?schema=public
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata: